apiVersion: v1
kind: ConfigMap
metadata:
  name: s3-browser-app
  namespace: default
data:
  app.py: |
    import os
    import uuid
    import json
    import boto3
    import urllib.request
    import urllib.error
    from datetime import datetime
    from flask import Flask, render_template_string, request, redirect, url_for
    from botocore.exceptions import ClientError, NoCredentialsError

    app = Flask(__name__)

    S3_BUCKET         = os.getenv('S3_BUCKET_NAME', 'unknown')
    S3_BUCKET_ARN     = os.getenv('S3_BUCKET_ARN', 'unknown')
    TABLE_NAME        = os.getenv('DYNAMODB_TABLE_NAME', 'unknown')
    TABLE_ARN         = os.getenv('DYNAMODB_TABLE_ARN', 'unknown')
    REGION            = os.getenv('AWS_DEFAULT_REGION', 'us-west-2')
    APP_NAME          = os.getenv('KUBEVELA_APP_NAME', 'unknown')
    APP_NAMESPACE     = os.getenv('KUBEVELA_APP_NAMESPACE', 'unknown')
    APP_CREATED_AT    = os.getenv('KUBEVELA_APP_CREATED_AT', 'unknown')

    def k8s_get(path):
        token_file = '/var/run/secrets/kubernetes.io/serviceaccount/token'
        ca_file    = '/var/run/secrets/kubernetes.io/serviceaccount/ca.crt'
        try:
            with open(token_file) as f:
                token = f.read().strip()
            req = urllib.request.Request(
                f'https://kubernetes.default.svc{path}',
                headers={'Authorization': f'Bearer {token}', 'Accept': 'application/json'}
            )
            import ssl
            ctx = ssl.create_default_context(cafile=ca_file)
            with urllib.request.urlopen(req, context=ctx) as resp:
                return json.loads(resp.read())
        except Exception as e:
            return None

    def get_bucket_details():
        buckets = k8s_get('/apis/s3.aws.upbound.io/v1beta2/buckets') or {}
        obj = next((b for b in buckets.get('items', [])
                    if b.get('spec', {}).get('forProvider', {}).get('tags', {}).get('App') == APP_NAME), None)
        if not obj:
            return {}
        fp = obj.get('spec', {}).get('forProvider', {})
        return {
            'tags':            fp.get('tags', {}),
            'deletion_policy': obj.get('spec', {}).get('deletionPolicy', 'Delete'),
        }

    def get_dynamodb():
        return boto3.resource('dynamodb', region_name=REGION)

    def get_s3():
        return boto3.client('s3', region_name=REGION)

    LAYOUT = '''
    <!DOCTYPE html>
    <html>
    <head>
        <title>KubeCon EU 2026 - Address Book</title>
        <style>
            * { box-sizing: border-box; margin: 0; padding: 0; }
            body { font-family: Arial, sans-serif; background: #f0f2f5; color: #333; }
            .header { background: white; border-bottom: 3px solid #006fff; padding: 16px 32px; display: flex; align-items: center; gap: 16px; }
            .header img { height: 44px; }
            .header h1 { font-size: 1.4em; font-weight: 600; color: #1a1a2e; }
            .nav { background: #006fff; padding: 0 32px; display: flex; gap: 4px; }
            .nav a { color: rgba(255,255,255,0.75); text-decoration: none; padding: 10px 16px; display: inline-block; font-size: 0.9em; }
            .nav a:hover, .nav a.active { color: white; border-bottom: 2px solid white; }
            .container { max-width: 1000px; margin: 32px auto; padding: 0 16px; }
            .card { background: white; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); padding: 24px; margin-bottom: 24px; }
            .card h2 { font-size: 1.1em; margin-bottom: 16px; color: #1a1a2e; }
            .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 0.9em; }
            .info-grid span { color: #666; }
            .info-grid strong { color: #333; }
            table { width: 100%; border-collapse: collapse; font-size: 0.9em; }
            th { background: #f5f5f5; padding: 10px 12px; text-align: left; font-weight: 600; color: #555; border-bottom: 2px solid #e0e0e0; }
            td { padding: 10px 12px; border-bottom: 1px solid #eee; }
            tr:hover td { background: #fafafa; }
            .empty { text-align: center; color: #999; padding: 32px; }
            form .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
            form input, form textarea { width: 100%; padding: 8px 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 0.9em; }
            form textarea { grid-column: span 2; height: 80px; resize: vertical; }
            .btn { background: #1976d2; color: white; border: none; padding: 10px 24px; border-radius: 4px; cursor: pointer; font-size: 0.9em; }
            .btn:hover { background: #1565c0; }
            .error { background: #ffebee; border: 1px solid #f44336; color: #c62828; padding: 12px; border-radius: 4px; margin-bottom: 16px; }
            .success { background: #e8f5e9; border: 1px solid #4caf50; color: #2e7d32; padding: 12px; border-radius: 4px; margin-bottom: 16px; }
            .badge { display: inline-block; background: #e3f2fd; color: #1565c0; border-radius: 12px; padding: 2px 10px; font-size: 0.8em; }
        </style>
    </head>
    <body>
        <div class="header">
            <img src="https://kubevela.io/img/logo.svg" alt="KubeVela" />
            <h1>KubeCon EU Demo 2026</h1>
        </div>
        <div class="nav">
            <a href="/infra" class="{{ 'active' if active == 'infra' }}">⚙️ Infrastructure</a>
            <a href="/files" class="{{ 'active' if active == 'files' }}">🪣 S3 Files</a>
            <a href="/" class="{{ 'active' if active == 'book' }}">📒 Address Book</a>
        </div>
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </body>
    </html>
    '''

    ADDRESS_BOOK = LAYOUT.replace('{% block content %}{% endblock %}', '''
        {% if error %}<div class="error">{{ error }}</div>{% endif %}
        {% if success %}<div class="success">{{ success }}</div>{% endif %}

        <div class="card">
            <h2>✍️ Sign the Book</h2>
            <form method="POST" action="/sign">
                <div class="row">
                    <input name="name"    placeholder="Name *"    required />
                    <input name="company" placeholder="Company"          />
                </div>
                <div class="row">
                    <input name="email"   placeholder="Email"            />
                    <input name="role"    placeholder="Role / Title"      />
                </div>
                <div class="row">
                    <textarea name="message" placeholder="Leave a message..." style="grid-column: span 2;"></textarea>
                </div>
                <button class="btn" type="submit">Sign ✍️</button>
            </form>
        </div>

        <div class="card">
            <h2>📒 Attendees <span class="badge">{{ entries|length }}</span></h2>
            {% if entries %}
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Company</th>
                        <th>Role</th>
                        <th>Email</th>
                        <th>Message</th>
                        <th>Signed</th>
                    </tr>
                </thead>
                <tbody>
                {% for e in entries %}
                    <tr>
                        <td><strong>{{ e.name }}</strong></td>
                        <td>{{ e.get('company', '') }}</td>
                        <td>{{ e.get('role', '') }}</td>
                        <td>{{ e.get('email', '') }}</td>
                        <td>{{ e.get('message', '') }}</td>
                        <td style="color:#999; font-size:0.8em;">{{ e.get('signed_at', '') }}</td>
                    </tr>
                {% endfor %}
                </tbody>
            </table>
            {% else %}
            <p class="empty">No entries yet — be the first to sign! 👆</p>
            {% endif %}
        </div>
    ''')

    S3_FILES = LAYOUT.replace('{% block content %}{% endblock %}', '''
        <div class="card">
            <h2>🪣 S3 Bucket Contents</h2>
            {% if error %}
                <div class="error">{{ error }}</div>
            {% elif objects %}
            <table>
                <thead><tr><th>Key</th><th>Size</th><th>Last Modified</th><th></th></tr></thead>
                <tbody>
                {% for obj in objects %}
                    <tr>
                        <td>📄 {{ obj.key }}</td>
                        <td>{{ obj.size }} bytes</td>
                        <td style="color:#999; font-size:0.85em;">{{ obj.last_modified }}</td>
                        <td><a href="/files/view/{{ obj.key }}">View</a></td>
                    </tr>
                {% endfor %}
                </tbody>
            </table>
            {% else %}
            <p class="empty">Bucket is empty.</p>
            {% endif %}
        </div>
    ''')

    FILE_VIEW = LAYOUT.replace('{% block content %}{% endblock %}', '''
        <div class="card">
            <h2>📄 {{ filename }}</h2>
            {% if error %}
                <div class="error">{{ error }}</div>
            {% else %}
            <p style="color:#666; font-size:0.85em; margin-bottom:16px;">{{ size }} bytes · {{ content_type }} · {{ last_modified }}</p>
            <pre style="background:#f5f5f5; padding:16px; border-radius:4px; overflow-x:auto; font-size:0.85em;">{{ content }}</pre>
            {% endif %}
            <br/><a href="/files">← Back to files</a>
        </div>
    ''')

    INFRA = LAYOUT.replace('{% block content %}{% endblock %}', '''
        <div class="card">
            <h2>📦 KubeVela Application</h2>
            <div class="info-grid">
                <span>App Name</span>         <strong>{{ app_name }}</strong>
                <span>Namespace</span>        <strong>{{ app_namespace }}</strong>
                <span>Deployed At</span>      <strong>{{ app_created_at }}</strong>
            </div>
        </div>
        <div class="card">
            <h2>🪣 S3 Bucket</h2>
            <div class="info-grid">
                <span>Bucket Name</span>      <strong>{{ bucket_name }}</strong>
                <span>Bucket ARN</span>       <strong style="font-size:0.85em;">{{ bucket_arn }}</strong>
                <span>Region</span>           <strong>{{ region }}</strong>
                <span>Deletion Policy</span>  <strong>{{ bucket.deletion_policy }}</strong>
            </div>
            {% if bucket.tags %}
            <h3 style="margin: 16px 0 8px; font-size:0.95em; color:#555;">Tags</h3>
            <div class="info-grid">
                {% for k, v in bucket.tags.items() %}
                <span>{{ k }}</span><strong>{{ v }}</strong>
                {% endfor %}
            </div>
            {% endif %}
        </div>
        <div class="card">
            <h2>🗄️ DynamoDB Table</h2>
            <div class="info-grid">
                <span>Table Name</span>       <strong>{{ table_name }}</strong>
                <span>Table ARN</span>        <strong style="font-size:0.85em;">{{ table_arn }}</strong>
                <span>Region</span>           <strong>{{ region }}</strong>
                <span>Deletion Policy</span>  <strong>Orphan</strong>
            </div>
        </div>
    ''')

    @app.route('/')
    def index():
        try:
            table = get_dynamodb().Table(TABLE_NAME)
            result = table.scan()
            entries = sorted(result.get('Items', []), key=lambda x: x.get('signed_at', ''), reverse=True)
            return render_template_string(ADDRESS_BOOK, entries=entries, active='book', error=None, success=request.args.get('success'))
        except Exception as e:
            return render_template_string(ADDRESS_BOOK, entries=[], active='book', error=str(e), success=None)

    @app.route('/sign', methods=['POST'])
    def sign():
        name = request.form.get('name', '').strip()
        if not name:
            return redirect(url_for('index'))
        entry = {
            'id':        str(uuid.uuid4()),
            'name':      name,
            'company':   request.form.get('company', '').strip(),
            'email':     request.form.get('email', '').strip(),
            'role':      request.form.get('role', '').strip(),
            'message':   request.form.get('message', '').strip(),
            'signed_at': datetime.utcnow().strftime('%Y-%m-%d %H:%M UTC'),
        }
        try:
            get_dynamodb().Table(TABLE_NAME).put_item(Item=entry)
            return redirect(url_for('index', success=f"Hey {name}, thanks for attending the KubeVela booth! 🎉"))
        except Exception as e:
            return render_template_string(ADDRESS_BOOK, entries=[], active='book', error=str(e), success=None)

    @app.route('/files')
    def files():
        try:
            s3 = get_s3()
            response = s3.list_objects_v2(Bucket=S3_BUCKET)
            objects = [{'key': o['Key'], 'size': o['Size'], 'last_modified': o['LastModified'].strftime('%Y-%m-%d %H:%M')} for o in response.get('Contents', [])]
            return render_template_string(S3_FILES, objects=objects, active='files', error=None)
        except Exception as e:
            return render_template_string(S3_FILES, objects=[], active='files', error=str(e))

    @app.route('/files/view/<path:filename>')
    def view_file(filename):
        try:
            s3 = get_s3()
            head = s3.head_object(Bucket=S3_BUCKET, Key=filename)
            body = s3.get_object(Bucket=S3_BUCKET, Key=filename)['Body'].read()
            try:
                content_str = body.decode('utf-8')
            except UnicodeDecodeError:
                content_str = f'[Binary file - {len(body)} bytes]'
            return render_template_string(FILE_VIEW, filename=filename, size=head.get('ContentLength', len(body)), content_type=head.get('ContentType', 'unknown'), last_modified=head.get('LastModified', ''), content=content_str, active='files', error=None)
        except Exception as e:
            return render_template_string(FILE_VIEW, filename=filename, size=0, content_type='', last_modified='', content='', active='files', error=str(e))

    @app.route('/infra')
    def infra():
        bucket = get_bucket_details()
        return render_template_string(INFRA, bucket_name=S3_BUCKET, bucket_arn=S3_BUCKET_ARN, table_name=TABLE_NAME, table_arn=TABLE_ARN, region=REGION, app_name=APP_NAME, app_namespace=APP_NAMESPACE, app_created_at=APP_CREATED_AT, bucket=bucket, active='infra')

    if __name__ == '__main__':
        app.run(host='0.0.0.0', port=5000, debug=True, use_reloader=True)
